<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메가커피 양도양수 상세페이지</title>
  <style>
    body {
      margin: 0;
      background: #f5f2ec;
      color: #241811;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    header {
      padding: 32px 18px 22px;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #e5ded2;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }
    p {
      margin: 0;
      color: #6b5a4c;
      font-size: 14px;
      line-height: 1.6;
    }
    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 0 40px;
    }
    figure {
      margin: 0 0 18px;
      background: #ffffff;
      border-bottom: 1px solid #e5ded2;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    figcaption {
      padding: 10px 14px 14px;
      font-size: 13px;
      color: #7a6859;
    }
  </style>
</head>
<body>
  <header>
    <h1>메가커피 양도양수 상세페이지</h1>
    <p>서울시 노원구 매물 참고 정보 기준으로 제작한 12컷 판매용 초안</p>
  </header>
  <main>
    <figure><img src="images/cut-01.png" alt="상세페이지 1컷"><figcaption>컷 01</figcaption></figure>
    <figure><img src="images/cut-02.png" alt="상세페이지 2컷"><figcaption>컷 02</figcaption></figure>
    <figure><img src="images/cut-03.png" alt="상세페이지 3컷"><figcaption>컷 03</figcaption></figure>
    <figure><img src="images/cut-04.png" alt="상세페이지 4컷"><figcaption>컷 04</figcaption></figure>
    <figure><img src="images/cut-05.png" alt="상세페이지 5컷"><figcaption>컷 05</figcaption></figure>
    <figure><img src="images/cut-06.png" alt="상세페이지 6컷"><figcaption>컷 06</figcaption></figure>
    <figure><img src="images/cut-07.png" alt="상세페이지 7컷"><figcaption>컷 07</figcaption></figure>
    <figure><img src="images/cut-08.png" alt="상세페이지 8컷"><figcaption>컷 08</figcaption></figure>
    <figure><img src="images/cut-09.png" alt="상세페이지 9컷"><figcaption>컷 09</figcaption></figure>
    <figure><img src="images/cut-10.png" alt="상세페이지 10컷"><figcaption>컷 10</figcaption></figure>
    <figure><img src="images/cut-11.png" alt="상세페이지 11컷"><figcaption>컷 11</figcaption></figure>
    <figure><img src="images/cut-12.png" alt="상세페이지 12컷"><figcaption>컷 12</figcaption></figure>
  </main>
</body>
</html>
